<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>별별별 콘텐츠 인사이트 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    background: #FFEBF7;
    color: #1f1f1f;
    padding: 24px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px 0;
  }
  .updated {
    font-size: 12px;
    color: #8a8a8a;
    margin-bottom: 20px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    border: 1px solid #ececec;
    border-radius: 10px;
    padding: 14px 16px;
    background: #FFFACC;
  }
  .stat-card .label {
    font-size: 12px;
    color: #8a8a8a;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: 22px;
    font-weight: 600;
  }
  .charts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }
  .chart-box {
    border: 1px solid #ececec;
    border-radius: 10px;
    padding: 16px;
  }
  .chart-box h3 {
    font-size: 14px;
    margin: 0 0 12px 0;
    color: #444;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }
  th, td {
    border-bottom: 1px solid #f0f0f0;
    padding: 8px 10px;
    text-align: left;
    white-space: nowrap;
  }
  th {
    color: #8a8a8a;
    font-weight: 500;
  }
  .table-wrap {
    max-height: 360px;
    overflow: auto;
    border: 1px solid #ececec;
    border-radius: 10px;
  }
  .empty {
    color: #8a8a8a;
    font-size: 13px;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>별별별 콘텐츠 인사이트 대시보드</h1>
  <div class="updated">마지막 업데이트: <span id="updatedAt"></span></div>

  <div class="stats" id="stats"></div>
  <div class="charts" id="charts"></div>

<script>
  const DATA = [{"id":"3a152512-0f0a-808d-b2db-d73d64f98034","조회수":469,"프로필 활동":4,"기록일자":"2026-07-18","반응":16,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"장갑","비워두기":""},{"id":"3a152512-0f0a-800a-ba90-df3edd8875ac","조회수":588,"프로필 활동":2,"기록일자":"2026-07-18","반응":17,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"겨울잠옷","비워두기":""},{"id":"3a152512-0f0a-8017-9cc3-c4a0ac06eaa1","조회수":1425,"프로필 활동":37,"기록일자":"2026-07-18","반응":33,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"타이즈 코디","비워두기":""},{"id":"3a152512-0f0a-80b0-a57e-d4e4d5b59126","조회수":582,"프로필 활동":7,"기록일자":"2026-07-18","반응":21,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"SF 소설","비워두기":""},{"id":"3a152512-0f0a-804e-b87c-dc105c8f66d8","조회수":2826,"프로필 활동":6,"기록일자":"2026-07-18","반응":55,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"72시간 소개팅 플리","비워두기":""},{"id":"3a152512-0f0a-80bd-9df4-c9e0d061cf2a","조회수":885,"프로필 활동":0,"기록일자":"2026-07-18","반응":12,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"포인트 머플러","비워두기":""},{"id":"3a152512-0f0a-8023-baae-e3bb7aa38ff4","조회수":702,"프로필 활동":0,"기록일자":"2026-07-18","반응":9,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"겨울 스킨케어","비워두기":""},{"id":"3a152512-0f0a-80bb-92b4-d5fe76bd5608","조회수":897,"프로필 활동":1,"기록일자":"2026-07-18","반응":11,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"2026 다이어리","비워두기":""},{"id":"3a152512-0f0a-8052-aeed-eb7186f37981","조회수":615,"프로필 활동":3,"기록일자":"2026-07-18","반응":98,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"251118 코르티스 제임스","비워두기":""},{"id":"3a152512-0f0a-8053-8705-eab8445c78af","조회수":580,"프로필 활동":0,"기록일자":"2026-07-18","반응":8,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"한로로 0+0","비워두기":""},{"id":"3a152512-0f0a-8016-b398-c40f995eaa13","조회수":539,"프로필 활동":0,"기록일자":"2026-07-18","반응":12,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"여성 후리스 추천","비워두기":""},{"id":"3a152512-0f0a-80ce-8127-d8faf2064441","조회수":724,"프로필 활동":3,"기록일자":"2026-07-18","반응":11,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"겨울 슈즈 추천","비워두기":""},{"id":"3a152512-0f0a-80a6-b5c4-eb4df128b604","조회수":636,"프로필 활동":0,"기록일자":"2026-07-18","반응":11,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"수능 전 응원짤/행운짤 모음","비워두기":""},{"id":"3a152512-0f0a-80db-aac4-c0d3a73f9104","조회수":551,"프로필 활동":1,"기록일자":"2026-07-18","반응":11,"수식":null,"기록자":["박채원 ‎"],"콘텐츠":"가을네일 추구미","비워두기":""}];
  const NUMBER_COLS = ["조회수","프로필 활동","반응"];
  const DATE_COLS = ["기록일자"];
  const CATEGORY_COLS = ["비워두기"];
  const TITLE_COL = "비워두기";
  const GENERATED_AT = "2026-07-18T07:51:10.744Z";

  document.getElementById("updatedAt").textContent =
    new Date(GENERATED_AT).toLocaleString("ko-KR");

  if (window.ChartDataLabels) {
    Chart.register(ChartDataLabels);
  }

  // ---- 요약 카드 ----
  const statsEl = document.getElementById("stats");
  const totalCard = document.createElement("div");
  totalCard.className = "stat-card";
  totalCard.innerHTML = `<div class="label">게시물 수</div><div class="value">${DATA.length}</div>`;
  statsEl.appendChild(totalCard);

  NUMBER_COLS.slice(0, 3).forEach((col) => {
    const values = DATA.map((r) => r[col]).filter((v) => typeof v === "number");
    const sum = values.reduce((a, b) => a + b, 0);
    const avg = values.length ? (sum / values.length).toFixed(1) : 0;
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = `<div class="label">${col} 평균</div><div class="value">${avg}</div>`;
    statsEl.appendChild(card);
  });

  // ---- 차트 영역 ----
  const chartsEl = document.getElementById("charts");
  const palette = ["#6366f1", "#22c55e", "#f97316", "#ef4444", "#06b6d4", "#a855f7"];

  function makeChartBox(title) {
    const box = document.createElement("div");
    box.className = "chart-box";
    const h3 = document.createElement("h3");
    h3.textContent = title;
    const canvas = document.createElement("canvas");
    box.appendChild(h3);
    box.appendChild(canvas);
    chartsEl.appendChild(box);
    return canvas;
  }

  // 컬럼 이름에 특정 키워드가 포함된 숫자 컬럼을 찾아줍니다.
  // (정확한 속성명이 조금 달라도 "조회수", "반응", "프로필" 이 들어가면 인식)
  function findColByKeyword(keyword) {
    if (DATA.length === 0) return null;
    return Object.keys(DATA[0]).find(
      (k) => k.includes(keyword) && NUMBER_COLS.includes(k)
    );
  }

  const VIEW_COL = findColByKeyword("조회수");
  const REACTION_COL = findColByKeyword("반응");
  const PROFILE_COL = findColByKeyword("프로필");

  // 항목 이름으로 보여줄 컬럼을 찾습니다.
  // 1순위: 노션 기본 제목(title) 속성에 값이 채워져 있으면 그걸 사용
  // 2순위: 컬럼 이름에 "제목"/"콘텐츠"/"이름"이 포함된 텍스트 속성 중 값이 채워진 것
  function pickLabelColumn() {
    if (DATA.length === 0) return null;

    const isFilled = (col) => {
      const filledCount = DATA.filter(
        (r) => r[col] !== null && r[col] !== undefined && r[col].toString().trim() !== ""
      ).length;
      return filledCount / DATA.length > 0.5;
    };

    if (TITLE_COL && isFilled(TITLE_COL)) return TITLE_COL;

    const keywords = ["제목", "콘텐츠", "이름"];
    for (const kw of keywords) {
      const candidate = Object.keys(DATA[0])
        .filter((k) => k !== "id" && k !== TITLE_COL && k.includes(kw))
        .find((k) => isFilled(k));
      if (candidate) return candidate;
    }

    return TITLE_COL || null;
  }

  const LABEL_COL = pickLabelColumn();

  // 조회수 / 반응 / 프로필 활동 TOP 5 가로 막대 차트
  function renderTop5(chartTitle, valueCol) {
    const box = makeChartBox(chartTitle);

    if (!valueCol) {
      const available = Object.keys(DATA[0] || {})
        .filter((k) => k !== "id")
        .join(", ");
      box.outerHTML = `<div class="empty">"${chartTitle}"에 해당하는 숫자 속성을 찾지 못했어요.<br/>사용 가능한 속성: ${available}</div>`;
      return;
    }

    const sorted = [...DATA]
      .filter((r) => typeof r[valueCol] === "number")
      .sort((a, b) => b[valueCol] - a[valueCol])
      .slice(0, 5);

    const labels = sorted.map((r) => {
      const t = LABEL_COL ? r[LABEL_COL] : "";
      const text = (t || "(제목 없음)").toString();
      return text.length > 18 ? text.slice(0, 18) + "…" : text;
    });

    new Chart(box, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: valueCol,
            data: sorted.map((r) => r[valueCol]),
            backgroundColor: "#FFBBE4",
            borderRadius: 6,
          },
        ],
      },
      options: {
        indexAxis: "y",
        responsive: true,
        layout: { padding: { right: 36 } },
        plugins: {
          legend: { display: false },
          datalabels: {
            anchor: "end",
            align: "end",
            color: "#333",
            font: { weight: "600", size: 12 },
            formatter: (value) => value.toLocaleString(),
          },
        },
        scales: { x: { beginAtZero: true } },
      },
    });
  }

  renderTop5("조회수 TOP 5", VIEW_COL);
  renderTop5("반응 TOP 5", REACTION_COL);
  renderTop5("프로필 활동 TOP 5", PROFILE_COL);
</script>
</body>
</html>
