<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>별별별 콘텐츠 인사이트 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    background: #ffffff;
    color: #1f1f1f;
    padding: 24px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px 0;
  }
  .updated {
    font-size: 12px;
    color: #8a8a8a;
    margin-bottom: 20px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    border: 1px solid #ececec;
    border-radius: 10px;
    padding: 14px 16px;
    background: #fafafa;
  }
  .stat-card .label {
    font-size: 12px;
    color: #8a8a8a;
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-size: 22px;
    font-weight: 600;
  }
  .charts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }
  .chart-box {
    border: 1px solid #ececec;
    border-radius: 10px;
    padding: 16px;
  }
  .chart-box h3 {
    font-size: 14px;
    margin: 0 0 12px 0;
    color: #444;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }
  th, td {
    border-bottom: 1px solid #f0f0f0;
    padding: 8px 10px;
    text-align: left;
    white-space: nowrap;
  }
  th {
    color: #8a8a8a;
    font-weight: 500;
  }
  .table-wrap {
    max-height: 360px;
    overflow: auto;
    border: 1px solid #ececec;
    border-radius: 10px;
  }
  .empty {
    color: #8a8a8a;
    font-size: 13px;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>별별별 콘텐츠 인사이트 대시보드</h1>
  <div class="updated">마지막 업데이트: <span id="updatedAt"></span></div>

  <div class="stats" id="stats"></div>
  <div class="charts" id="charts"></div>

  <div class="table-wrap">
    <table id="dataTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

<script>
  const DATA = [{"id":"3a152512-0f0a-808d-b2db-d73d64f98034","조회수":469,"프로필 활동":4,"기록일자":"2026-07-18","반응":16,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-800a-ba90-df3edd8875ac","조회수":588,"프로필 활동":2,"기록일자":"2026-07-18","반응":17,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-8017-9cc3-c4a0ac06eaa1","조회수":1425,"프로필 활동":37,"기록일자":"2026-07-18","반응":33,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-80b0-a57e-d4e4d5b59126","조회수":582,"프로필 활동":7,"기록일자":"2026-07-18","반응":21,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-804e-b87c-dc105c8f66d8","조회수":2826,"프로필 활동":6,"기록일자":"2026-07-18","반응":55,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-80bd-9df4-c9e0d061cf2a","조회수":885,"프로필 활동":0,"기록일자":"2026-07-18","반응":12,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-8023-baae-e3bb7aa38ff4","조회수":702,"프로필 활동":0,"기록일자":"2026-07-18","반응":9,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-80bb-92b4-d5fe76bd5608","조회수":897,"프로필 활동":1,"기록일자":"2026-07-18","반응":11,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-8052-aeed-eb7186f37981","조회수":615,"프로필 활동":3,"기록일자":"2026-07-18","반응":98,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-8053-8705-eab8445c78af","조회수":580,"프로필 활동":0,"기록일자":"2026-07-18","반응":8,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-8016-b398-c40f995eaa13","조회수":539,"프로필 활동":0,"기록일자":"2026-07-18","반응":12,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-80ce-8127-d8faf2064441","조회수":724,"프로필 활동":3,"기록일자":"2026-07-18","반응":11,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-80a6-b5c4-eb4df128b604","조회수":636,"프로필 활동":0,"기록일자":"2026-07-18","반응":11,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""},{"id":"3a152512-0f0a-80db-aac4-c0d3a73f9104","조회수":551,"프로필 활동":1,"기록일자":"2026-07-18","반응":11,"기록자":["박채원 ‎"],"콘텐츠":null,"비워두기":""}];
  const NUMBER_COLS = ["조회수","프로필 활동","반응"];
  const DATE_COLS = ["기록일자"];
  const CATEGORY_COLS = ["비워두기"];
  const GENERATED_AT = "2026-07-18T07:15:28.810Z";

  document.getElementById("updatedAt").textContent =
    new Date(GENERATED_AT).toLocaleString("ko-KR");

  // ---- 요약 카드 ----
  const statsEl = document.getElementById("stats");
  const totalCard = document.createElement("div");
  totalCard.className = "stat-card";
  totalCard.innerHTML = `<div class="label">전체 행 수</div><div class="value">${DATA.length}</div>`;
  statsEl.appendChild(totalCard);

  NUMBER_COLS.slice(0, 3).forEach((col) => {
    const values = DATA.map((r) => r[col]).filter((v) => typeof v === "number");
    const sum = values.reduce((a, b) => a + b, 0);
    const avg = values.length ? (sum / values.length).toFixed(1) : 0;
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = `<div class="label">${col} 평균</div><div class="value">${avg}</div>`;
    statsEl.appendChild(card);
  });

  // ---- 차트 영역 ----
  const chartsEl = document.getElementById("charts");
  const palette = ["#6366f1", "#22c55e", "#f97316", "#ef4444", "#06b6d4", "#a855f7"];

  function makeChartBox(title) {
    const box = document.createElement("div");
    box.className = "chart-box";
    const h3 = document.createElement("h3");
    h3.textContent = title;
    const canvas = document.createElement("canvas");
    box.appendChild(h3);
    box.appendChild(canvas);
    chartsEl.appendChild(box);
    return canvas;
  }

  // 1) 날짜 컬럼 + 숫자 컬럼 -> 라인 차트 (시간에 따른 추이)
  if (DATE_COLS.length > 0 && NUMBER_COLS.length > 0) {
    const dateCol = DATE_COLS[0];
    const sorted = [...DATA].filter((r) => r[dateCol]).sort((a, b) => (a[dateCol] > b[dateCol] ? 1 : -1));
    const labels = sorted.map((r) => r[dateCol]);
    const canvas = makeChartBox(`${dateCol}별 추이`);
    new Chart(canvas, {
      type: "line",
      data: {
        labels,
        datasets: NUMBER_COLS.slice(0, 3).map((col, i) => ({
          label: col,
          data: sorted.map((r) => r[col]),
          borderColor: palette[i % palette.length],
          backgroundColor: palette[i % palette.length] + "33",
          tension: 0.3,
        })),
      },
      options: { responsive: true, plugins: { legend: { position: "bottom" } } },
    });
  }

  // 2) 카테고리 컬럼 -> 개수 바 차트
  CATEGORY_COLS.slice(0, 2).forEach((col, idx) => {
    const counts = {};
    DATA.forEach((r) => {
      const v = r[col];
      if (v === null || v === undefined) return;
      const key = Array.isArray(v) ? v.join(", ") : v;
      counts[key] = (counts[key] || 0) + 1;
    });
    const labels = Object.keys(counts);
    const values = Object.values(counts);
    const canvas = makeChartBox(`${col} 분포`);
    new Chart(canvas, {
      type: "bar",
      data: {
        labels,
        datasets: [{ label: "개수", data: values, backgroundColor: palette[idx % palette.length] }],
      },
      options: { responsive: true, plugins: { legend: { display: false } } },
    });
  });

  if (chartsEl.children.length === 0) {
    chartsEl.innerHTML = '<div class="empty">차트로 그릴 만한 날짜/숫자/카테고리 컬럼을 찾지 못했어요. 데이터베이스 속성을 확인해주세요.</div>';
  }

  // ---- 원본 데이터 테이블 ----
  const table = document.getElementById("dataTable");
  const thead = table.querySelector("thead");
  const tbody = table.querySelector("tbody");

  if (DATA.length > 0) {
    const cols = Object.keys(DATA[0]).filter((c) => c !== "id");
    const trHead = document.createElement("tr");
    cols.forEach((c) => {
      const th = document.createElement("th");
      th.textContent = c;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);

    DATA.forEach((row) => {
      const tr = document.createElement("tr");
      cols.forEach((c) => {
        const td = document.createElement("td");
        const v = row[c];
        td.textContent = Array.isArray(v) ? v.join(", ") : (v ?? "");
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  } else {
    tbody.innerHTML = '<tr><td class="empty">데이터가 없습니다.</td></tr>';
  }
</script>
</body>
</html>
